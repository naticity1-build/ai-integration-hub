# Render Blueprint — AI Integration Hub MCP Server
# Web UI deploys separately on Vercel.

services:
  - type: web
    name: hub-mcp-server
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: frankfurt
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MCP_TRANSPORT
        value: http
      - key: HUB_STORE
        value: supabase
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: HUB_SECRET_KEY
        sync: false
      - key: PORT
        value: "3100"
